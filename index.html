<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hample Design House | Structural Blueprints</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Three.js Library for 3D Geometry -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --bg-outer: #1e2633; 
            --bg-inner: #0f1626; 
            --bg-pill: #1e2a3b;  
            --accent-blue: #3b82f6; 
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --font-head: 'Syncopate', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-lg: 24px;
            --radius-pill: 50px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #2b394d 0%, #111824 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            color: var(--text-light);
            padding: 2rem;
            overflow-x: hidden;
        }

        /* --- MAIN CONTAINER --- */
        .app-container {
            background-color: var(--bg-inner);
            width: 100%;
            max-width: 1400px;
            height: 85vh;
            min-height: 700px;
            border-radius: var(--radius-lg);
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            padding: 2rem;
            gap: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- LEFT COLUMN --- */
        .col-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        /* Top Nav Pills */
        .nav-pills {
            background-color: var(--bg-pill);
            display: inline-flex;
            border-radius: var(--radius-pill);
            padding: 0.3rem;
            align-self: flex-start;
        }

        .nav-pills a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-pill);
            transition: 0.3s;
        }

        .nav-pills a.active {
            background-color: var(--accent-blue);
        }

        .nav-pills a:hover:not(.active) {
            background-color: rgba(255,255,255,0.1);
        }

        /* Typography Block */
        .brand-block {
            margin-top: -2rem; 
        }

        .brand-sub {
            font-family: var(--font-head);
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--accent-blue);
        }

        .brand-title {
            font-family: var(--font-head);
            font-size: clamp(2rem, 3.5vw, 3rem);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .brand-title span.block {
            display: block;
            font-size: clamp(1.2rem, 2.5vw, 2rem);
            letter-spacing: 4px;
            color: var(--text-dim);
        }

        /* Bottom Text Block */
        .info-block {
            max-width: 85%;
        }

        .info-title {
            font-family: var(--font-head);
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-desc {
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* --- CENTER COLUMN (3D CANVAS CONTAINER) --- */
        .col-center {
            height: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            border: 1px solid rgba(59, 130, 246, 0.1);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 15px 100%, 0 calc(100% - 15px));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            cursor: move; /* Indicates it can be interacted with */
        }

        /* --- RIGHT COLUMN --- */
        .col-right {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }

        /* Top Action Bar */
        .action-bar {
            display: flex;
            gap: 0.8rem;
        }

        .btn-contact {
            background-color: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            text-decoration: none;
            font-family: var(--font-head);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-pill);
            display: flex;
            align-items: center;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-contact:hover {
            background-color: var(--accent-blue);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-pill);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* Mini Cards with CSS Geometries */
        .cards-container {
            display: flex;
            gap: 1rem;
            margin-top: -2rem; 
        }

        .mini-card {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            background-color: var(--bg-pill);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            perspective: 600px;
        }

        /* Mini Gyroscope */
        .wireframe-gyro {
            position: absolute;
            top: 20%;
            left: 25%;
            width: 70px;
            height: 70px;
            transform-style: preserve-3d;
            animation: spin-gyro 8s infinite linear;
        }

        .gyro-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid var(--text-light);
            opacity: 0.6;
        }

        .gyro-ring:nth-child(1) { transform: rotateX(0deg); }
        .gyro-ring:nth-child(2) { transform: rotateX(60deg) rotateY(45deg); }
        .gyro-ring:nth-child(3) { transform: rotateX(120deg) rotateY(90deg); }

        @keyframes spin-gyro {
            0% { transform: rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateY(360deg) rotateZ(360deg); }
        }

        /* Nested Cubes */
        .nested-cubes {
            position: absolute;
            top: 25%;
            left: 25%;
            width: 60px;
            height: 60px;
            transform-style: preserve-3d;
            animation: spin-nested 12s infinite linear alternate;
        }

        .nested-box {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid var(--text-dim);
            transform-style: preserve-3d;
        }

        .inner-box {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            border: 1px solid var(--accent-blue);
            animation: spin-inner 6s infinite linear;
        }

        @keyframes spin-nested {
            0% { transform: rotateX(45deg) rotateY(0deg); }
            100% { transform: rotateX(45deg) rotateY(360deg); }
        }

        @keyframes spin-inner {
            0% { transform: rotateZ(0deg) rotateY(0deg); }
            100% { transform: rotateZ(360deg) rotateY(-360deg); }
        }

        .card-content {
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 100%;
        }

        .card-text {
            font-size: 0.65rem;
            font-weight: 500;
            max-width: 70%;
            line-height: 1.3;
        }

        .card-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            text-decoration: none;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .mini-card:hover .card-btn {
            background-color: var(--accent-blue);
            transform: scale(1.1) rotate(45deg);
        }

        /* Social Icons */
        .social-links {
            display: flex;
            gap: 1.5rem;
            padding-bottom: 0.5rem;
        }

        .social-links a {
            color: var(--text-dim);
            font-size: 1rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--text-light);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr 1fr;
                height: auto;
            }
            .col-center {
                grid-column: 1 / -1;
                order: -1; 
                height: 400px;
            }
            .col-left, .col-right {
                gap: 2rem;
            }
            .brand-block, .cards-container {
                margin-top: 0;
            }
            .col-right {
                align-items: flex-start;
            }
        }

        @media (max-width: 650px) {
            body { padding: 1rem; }
            .app-container {
                grid-template-columns: 1fr;
                padding: 1.5rem;
            }
            .col-center {
                height: 350px;
            }
            .cards-container {
                width: 100%;
                justify-content: space-between;
            }
            .mini-card {
                width: 48%;
            }
            .action-bar {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

    <main class="app-container">
        
        <!-- LEFT COLUMN -->
        <div class="col-left">
            <nav class="nav-pills">
                <a href="#" class="active">Studio</a>
                <a href="#projects">Projects</a>
                <a href="#vision">Vision</a>
                <a href="#contact">Contact</a>
            </nav>

            <div class="brand-block">
                <span class="brand-sub">EST. 2026</span>
                <h1 class="brand-title">
                    HAMPLE
                    <span class="block">DESIGN HOUSE</span>
                </h1>
            </div>

            <div class="info-block">
                <h3 class="info-title">Pioneering Spatial Design</h3>
                <p class="info-desc">
                    Hample Design House crafts visionary digital environments and structural wireframes. We blur the lines between virtual architecture and structural reality.
                </p>
            </div>
        </div>

        <!-- CENTER COLUMN (3D PC WIREFRAME) -->
        <div class="col-center">
            <div id="canvas-container"></div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="col-right">
            
            <div class="action-bar">
                <a href="#inquire" class="btn-contact">Inquire</a>
                <a href="#profile" class="btn-icon"><i class="fa-regular fa-user"></i></a>
                <a href="#menu" class="btn-icon"><i class="fa-solid fa-bars-staggered"></i></a>
            </div>

            <div class="cards-container">
                <div class="mini-card">
                    <div class="wireframe-gyro">
                        <div class="gyro-ring"></div>
                        <div class="gyro-ring"></div>
                        <div class="gyro-ring"></div>
                    </div>
                    <div class="card-content">
                        <span class="card-text">Structural Integrity</span>
                        <a href="#" class="card-btn"><i class="fa-solid fa-arrow-up-right"></i></a>
                    </div>
                </div>

                <div class="mini-card">
                    <div class="nested-cubes">
                        <div class="nested-box"></div>
                        <div class="inner-box"></div>
                    </div>
                    <div class="card-content">
                        <span class="card-text">Digital Blueprints</span>
                        <a href="#" class="card-btn"><i class="fa-solid fa-arrow-up-right"></i></a>
                    </div>
                </div>
            </div>

            <div class="social-links">
                <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
                <a href="#"><i class="fa-solid fa-code-branch"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            </div>

        </div>
    </main>

    <!-- Interactive 3D Script -->
    <script>
        window.onload = function () {
            const container = document.getElementById('canvas-container');
            
            // 1. Setup Scene, Camera, and Renderer
            const scene = new THREE.Scene();
            
            // Adjust camera for a good isometric-ish view
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 5, 38); // Pulled camera back from 25 to 38 to fit the PC

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // 2. Create the PC Group
            const pcGroup = new THREE.Group();

            // The Glowing Blueprint Material
            // We use EdgesGeometry below so we only see the outlines, no ugly diagonal triangles.
            const material = new THREE.LineBasicMaterial({ 
                color: 0x3b82f6, 
                transparent: true, 
                opacity: 0.9 
            });

            // Helper function to draw a clean wireframe box
            function addWireframeBox(w, h, d, x, y, z, rotX = 0) {
                const geometry = new THREE.BoxGeometry(w, h, d);
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, material);
                line.position.set(x, y, z);
                line.rotation.x = rotX;
                pcGroup.add(line);
            }

            // --- BUILD THE RETRO PC ---
            
            // Desktop Base (The wide box underneath)
            addWireframeBox(10, 2.5, 10, 0, -3, 0);
            
            // Floppy drive details on the case
            addWireframeBox(2.5, 0.3, 0.3, 3, -2.5, 5);
            addWireframeBox(2.5, 0.3, 0.3, 3, -3.2, 5);

            // Monitor Base/Neck
            addWireframeBox(3, 1.5, 3, 0, -1, 0);

            // CRT Monitor (Front Bezel)
            addWireframeBox(8, 6.5, 4, 0, 3, 1);
            
            // CRT Monitor (Back Tube)
            addWireframeBox(5, 4.5, 5, 0, 3, -3.5);

            // Keyboard (Tilted slightly forward)
            addWireframeBox(9, 0.4, 4, 0, -5, 7, Math.PI / 12);

            // Add the constructed PC to the scene
            scene.add(pcGroup);

            // Initial positioning
            pcGroup.rotation.y = -Math.PI / 4; // Angle it nicely

            // 3. Mouse Interaction Setup
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            container.addEventListener('mousedown', (e) => { isDragging = true; });
            document.addEventListener('mouseup', (e) => { isDragging = false; });
            
            container.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaMove = {
                        x: e.offsetX - previousMousePosition.x,
                        y: e.offsetY - previousMousePosition.y
                    };
                    // Rotate based on mouse drag
                    pcGroup.rotation.y += deltaMove.x * 0.01;
                    pcGroup.rotation.x += deltaMove.y * 0.01;
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });

            // 4. Animation Loop
            function animate() {
                requestAnimationFrame(animate);
                
                // If not dragging, slowly auto-rotate and hover
                if (!isDragging) {
                    pcGroup.rotation.y += 0.003;
                    pcGroup.position.y = Math.sin(Date.now() * 0.001) * 0.4;
                }

                renderer.render(scene, camera);
            }

            // 5. Handle Window Resize
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            // Start the loop!
            animate();
        };
    </script>
</body>
</html>
